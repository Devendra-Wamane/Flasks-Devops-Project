name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Install dependencies
        run: |
          set -e
          cd repo
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Run tests
        run: |
          set -e
          cd repo
          python3 -m pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Build Docker image
        run: |
          set -e
          cd repo
          docker build -t flask-cicd-project .

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 over SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            cd /home/ubuntu/flask-cicd
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy.sh
            ./deploy.sh
          '